<head>

<body>
  <div id="cursor"></div>
  <div class="container">
    <header>
      <h1>Aditya Kumar Shahwal's Projects</h1>
      <p>Explore my web development projects and see what I've been working on.</p>
    </header>
    <ul class="project-grid">
      <li class="project-card"><a class="project-link" href="01-dom/index.html"><span>Toggle effect</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="02-calculator/index.html"><span>Simple Calculator</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="03-rock-paper-scissors/index.html"><span>Rock Paper Scissors</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="04-todo-list/index.html"><span>To-Do List App</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="05-amazon-project/javascript-amazon-project/amazon.html"><span>Amazon Project</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="https://adityashahwal.me" target="_blank"><span>Personal Portfolio Site</span><span class="icon-arrow">↗</span></a></li>
      <li class="project-card"><a class="project-link" href="07-js-game/index.html"><span>Javascript Snake Game</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="08-ColorSchemeGenerator/index.html"><span>Color Scheme Generator</span><span class="icon-arrow">→</span></a></li>
    </ul>
  </div>

  <script>
    const cursor = document.getElementById('cursor');
    const cards = document.querySelectorAll('.project-card');

    let isMoving = false;

    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      
      // Create trail effect on movement
      if (!isMoving) {
        requestAnimationFrame(() => {
          createTrail(e.clientX, e.clientY);
          isMoving = false;
        });
        isMoving = true;
      }
    });

    function createTrail(x, y) {
      const trail = document.createElement('div');
      trail.className = 'cursor-trail';
      trail.style.left = x + 'px';
      trail.style.top = y + 'px';
      document.body.appendChild(trail);

      // Remove the trail element after animation ends
      setTimeout(() => {
        trail.remove();
      }, 500);
    }

    cards.forEach(card => {
      card.addEventListener('mouseenter', () => {
        cursor.classList.add('hovered');
      });
      card.addEventListener('mouseleave', () => {
        cursor.classList.remove('hovered');
      });
    });
  </script>
</body>

</html>
