<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adityashahhhwal's Projects</title>
  <style>
    :root {
      --primary: #4361ee;
      --secondary: #3f37c9;
      --text-dark: #2b2d42;
      --text-light: #8d99ae;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: var(--text-dark);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 4rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text-dark);
      margin-bottom: 1rem;
      background: linear-gradient(to right, #4361ee, #7209b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-light);
      font-size: 1.25rem;
      margin: 0;
    }

    .project-grid {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(67, 97, 238, 0.15);
      border-color: rgba(67, 97, 238, 0.3);
    }

    .project-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 1.5rem;
      color: var(--text-dark);
      text-decoration: none;
      font-size: 1.15rem;
      font-weight: 600;
      height: 100%;
    }

    .project-link span {
      position: relative;
    }

    .project-link span::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--primary);
      transition: width 0.3s ease;
    }

    .project-card:hover .project-link span::after {
      width: 100%;
    }

    .icon-arrow {
      color: var(--primary);
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
    }

    .project-card:hover .icon-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    @media (max-width: 600px) {
      .container {
        padding: 3rem 1.5rem;
      }
      h1 {
        font-size: 2.25rem;
      }
      .project-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Adityashahhhwal's Projects</h1>
      <p>Welcome! Explore my beautiful web projects below.</p>
    </header>
    <ul class="project-grid">
      <li class="project-card"><a class="project-link" href="01-dom/index.html"><span>Toggle effect</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="02-calculator/index.html"><span>Simple Calculator</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="03-rock-paper-scissors/index.html"><span>Rock Paper Scissors Game</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="04-todo-list/index.html"><span>To-Do List App</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="05-amazon-project/javascript-amazon-project/amazon.html"><span>Amazon Project</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="https://adityashahwal.me" target="_blank"><span>Personal Portfolio Site</span><span class="icon-arrow">↗</span></a></li>
      <li class="project-card"><a class="project-link" href="07-js-game/index.html"><span>Javascript Snake Game</span><span class="icon-arrow">→</span></a></li>
      <li class="project-card"><a class="project-link" href="08-ColorSchemeGenerator/index.html"><span>Color Scheme Generator</span><span class="icon-arrow">→</span></a></li>
    </ul>
  </div>
</body>

</html>
