<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .js-gaming, .js-music, .js-tech {
            background-color: rgb(207, 200, 200);
            border: 2px solid rgb(21, 20, 20);
            font-size: clamp(1rem, 2vw, 1.75rem);
            font-weight: 500;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            min-width: clamp(80px, 15vw, 140px);
            min-height: clamp(40px, 5vw, 50px);
            transition: all 0.3s ease-in-out;
        }
        .js-gaming.clicked,.js-music.clicked,.js-tech.clicked {
            background-color: rgb(10, 84, 159);
            color: white;
            transform: scale(1.13);
        }
        main{
            display: flex;
            gap: 18px;
            flex-wrap: wrap;    
            justify-content: center;  
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>

<body>
    <main>
        <button class="js-gaming" onclick="response(event)">Aditya</button>
        <button class="js-tech" onclick="response(event)">Kumar</button>
        <button class="js-music" onclick="response(event)">Shahwal</button>
    </main>
    <script src="Tone.js"></script>
    <script src="index.js"></script>
</body>
</html>
